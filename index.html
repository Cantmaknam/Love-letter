<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Sophie ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #ff9ec0, #ff5fa2, #1a0b1f);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* glowing animated background */
    .glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.1), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.08), transparent 40%);
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* main card */
    .card {
      width: min(900px, 92vw);
      height: min(85vh, 850px);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 15px;
      font-size: 0.95rem;
    }

    .letter {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      line-height: 1.9;
      font-size: 1.05rem;
      white-space: pre-wrap;
    }

    /* hearts floating */
    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 18px;
      animation: rise linear forwards;
      opacity: 0.6;
    }

    @keyframes rise {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="card">
    <h1>Dear Sophie ❤️</h1>

    <div class="letter" id="letter"></div>
  </div>

  <script>
    const message = `Dear Sophie,

I honestly don't even know where to start because there are so many things I want to tell you. Every time I sit down to write something for you, I end up realizing that no matter how many words I use, it never feels like enough. There will never be enough pages, enough letters, or enough words to explain how much you mean to me.

You have become such a huge part of my life that it's hard to remember what life was like before you. Now you're in almost every thought I have. I wake up in the morning and you're one of the first things I think about. I go through my day thinking about you, looking forward to seeing you, texting you, calling you, or hearing about your day. Then somehow, after thinking about you all day, I still end up going to sleep thinking about you too.

It's honestly crazy how much one person can change someone's life.

Before I met you, I never thought I'd be sitting here writing pages and pages about someone. I can barely write an essay without getting bored, but I could write a whole book about how much I love you. Every memory we've made together is something I could talk about forever.

One thing I love is how the smallest things remind me of you. Like whenever I see a yellow car, I think of you. Whenever I see an orange cone, I think of you. Whenever I hear something funny that I know you'd laugh at, I think of you. Whenever I watch a movie I think of you being next to me. Whenever I have pizza or banana bread or cupcakes I think of you. Whenever I watch F1 I think of you. Sometimes I don't even realize it until later, but you've somehow become connected to so many little things in my life.

I love calling you before my rugby practices. It doesn't matter if it's a short call or a long one. Just hearing your voice before I go out there always makes my day better. I remember when I used to watch your volleyball games before my rugby practices. Even now, whenever I think about those afternoons, they make me smile. Watching you play always made me proud, and I don't think you realize how much I loved being there and seeing you play.

I love baking with you. I don't even care what we're making. Banana bread, cupcakes, pizza, or whatever random thing we decide to make. It's never really about the baking anyway. It's about being with you. Somehow even the simplest things become some of my favourite memories when I'm doing them with you.

One of my favourite things is when you paint my left pinky nail. It sounds like such a small thing, but it means so much to me. Whenever I miss you, I can just look down at my hand and think about you. It's like carrying a little piece of you around with me wherever I go. Every time I see it, I smile because it reminds me of you.

Whenever we watch movies together, I never really focus on just the movie. What I remember most is you sitting beside me. I remember you putting your head on my shoulder. I remember holding your hand. I remember hearing you laugh at things. Now whenever I watch a movie by myself, I always end up imagining you there next to me. It doesn't matter what movie it is. My brain automatically thinks about you sitting beside me with your head on my shoulder.

And every time you put your head on my shoulder or every time we hold hands, I always wish it could last forever. Those moments are so simple, but they're some of my favourite moments ever. When we're sitting together, holding hands, talking, or even just sitting in silence, everything feels right.

I love how comfortable I am around you. I never feel like I have to pretend to be someone else. I can just be me. That's one of the things I appreciate most about you. You make me feel accepted for exactly who I am.

You've also made me happier than I ever thought I could be. I don't know if I've told you this enough, but you've brought back a side of me that I thought was gone. You've made me feel like that happy little kid again who believed in fairytale love. The kind of kid who believed that one day he'd find his pretty princess and everything would just feel right. Then somehow you came into my life and made all of that feel real.

You genuinely feel like a wish come true.

Sometimes I sit there and think about how lucky I am that out of all the people in the world, I get to call you my girlfriend. It still feels unreal sometimes. You're not just my favourite person. You're my best friend. You're the person I want to tell everything to. You're the person I want to share all my good news with. You're the person I think about when something funny happens. You're the person I miss when we're apart.

When I tell you I love you, I don't say it because it's a habit. I don't say it because it's something couples are supposed to say. I say it because I mean it every single time. I say it because I want you to know how much you mean to me. I say it because you're genuinely the best thing that's ever happened to me.

And whenever I miss you, I end up doing the same things every time. I'll reread our messages. I'll scroll through old photos. I'll look through my camera roll just to see your smile. Somehow that always makes me feel better. It reminds me of how lucky I am to have you.

There are so many memories that I love. Walking around the school together. Baking together, going to the city when it was raining, watching movies, drinking boba, making legos, playing roblox, calling each other, texting each other, shooting on your netball hoop at your house and going to mcdonalds and just talking and theres so much more but every single one of those memories means so much to me because every single one of them was with you.

And the crazy thing is that my favourite memories with you probably haven't even happened yet.

There are still so many things I want to do with you, so many places I want to go with you, and so many memories I want to make with you. When I think about the future, you're always there in it.

Your heart is safe with me, I Pinky promise. I promise to always choose you. I promise to always be honest with you. I promise to listen to you. I promise to support you when things are difficult and celebrate with you when things are good. I promise to keep showing up every day because what we have is something I never want to take for granted. I promise to keep loving you through the easy days, the difficult days, the exciting days, and the boring days. I promise to keep appreciating you. I promise to keep reminding you how beautiful you are, how amazing you are, and how much you mean to me.

Because you are beautiful.

You're gorgeous.

You're amazing.

You're kind.

You're funny.

You're caring.

You're smart.

You're talented.

You're thoughtful.

You're everything I could have ever asked for and so much more.

Thank you for every conversation.

Thank you for every smile.

Thank you for every memory.

Thank you for every call before rugby practice.

Thank you for every movie.

Thank you for every walk.

Thank you for every message.

Thank you for every laugh.

Thank you for every moment.

Most of all, thank you for being you.

I love the person you are.

Forever and always, Jack ❤️
`;

    const el = document.getElementById("letter");
    let i = 0;

    function type() {
      if (i < message.length) {
        el.textContent += message[i];
        i++;
        setTimeout(type, 18);
      }
    }

    type();

    // floating hearts
    function heart() {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = Math.random() > 0.5 ? "❤️" : "💗";
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (12 + Math.random() * 20) + "px";
      h.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(h);

      setTimeout(() => h.remove(), 8000);
    }

    setInterval(heart, 250);
  </script>
</body>
</html>
